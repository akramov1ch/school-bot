services:
  postgres:
    image: postgres:16-alpine
    container_name: school_postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-school}
      POSTGRES_USER: ${POSTGRES_USER:-school}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-school}
      TZ: Asia/Tashkent
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-school} -d ${POSTGRES_DB:-school}"]
      interval: 5s
      timeout: 5s
      retries: 20

  redis:
    image: redis:7-alpine
    container_name: school_redis
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20

  app:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: school_app
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "${API_PORT:-8000}:8000"
    volumes:
      - ./:/app
      - ./google_creds:/app/google_creds:ro
    command: ["bash", "docker/entrypoint.sh"]

volumes:
  pg_data:
  redis_data: